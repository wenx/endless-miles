name: Daily Strava Sync

on:
  schedule:
    - cron: "0 22 * * *" # UTC 22:00 = Beijing 06:00
  workflow_dispatch: # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Restore Strava tokens
        run: |
          echo '{
            "refresh_token": "${{ secrets.STRAVA_REFRESH_TOKEN }}"
          }' > data/.tokens.json

      - name: Sync Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        run: npx tsx scripts/refetch.ts

      - name: Save updated refresh token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(python3 -c "import json; print(json.load(open('data/.tokens.json'))['refresh_token'])")
          gh secret set STRAVA_REFRESH_TOKEN --body "$NEW_TOKEN"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/activities.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "sync strava data"
          git push
